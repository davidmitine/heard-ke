<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow">
<title>Heard.ke — Review</title>
<style>
  :root{
    --bg:#211913; --bg-2:#2b211a; --line:#493a2e;
    --cream:#efe7d9; --muted:#b6a892; --amber:#e6a95c; --olive:#93a06a; --clay:#cd6046;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--cream);font-family:system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;padding:20px;max-width:680px;margin:0 auto}
  h1{font-size:1.3rem;margin-bottom:4px}
  .sub{color:var(--muted);font-size:.85rem;margin-bottom:20px}
  input,button,textarea{font-family:inherit}
  .gate{display:flex;gap:8px;margin-bottom:20px}
  .gate input{flex:1;background:var(--bg-2);border:1px solid var(--line);border-radius:10px;color:var(--cream);padding:11px 13px;font-size:1rem}
  .btn{background:var(--amber);color:#2a1c10;border:none;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer;font-size:.9rem}
  .btn:hover{filter:brightness(1.05)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--cream)}
  .section-nav{display:flex;gap:6px;margin-bottom:20px}
  .sectionbtn{flex:1;background:var(--bg-2);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:11px 6px;font-weight:700;font-size:.88rem;cursor:pointer;transition:.15s}
  .sectionbtn.on{background:var(--olive);color:#1c2314;border-color:transparent}
  .tabs{display:flex;gap:6px;margin-bottom:18px}
  .tab{flex:1;background:var(--bg-2);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:9px 6px;font-weight:600;font-size:.82rem;cursor:pointer;transition:.15s}
  .tab.on{background:var(--amber);color:#2a1c10;border-color:transparent}
  .card{background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px}
  .card.flagged{border-color:var(--clay)}
  .card.past{opacity:.55}
  .meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:.72rem;color:var(--muted);margin-bottom:10px}
  .badge{border:1px solid var(--line);border-radius:6px;padding:2px 7px;text-transform:uppercase;letter-spacing:.05em}
  .badge.harm{border-color:var(--clay);color:#f0a58f}
  .badge.ai{border-color:var(--olive);color:#b9c495}
  .badge.synced{border-color:#7a9cc6;color:#a9c3e6}
  .synced-note{color:var(--muted);font-size:.78rem;margin-top:4px}
  .txt{white-space:pre-wrap;margin-bottom:14px}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .row button{border:1px solid var(--line);background:transparent;color:var(--cream);border-radius:9px;padding:9px 14px;font-weight:600;font-size:.85rem;cursor:pointer;transition:.15s}
  .approve{border-color:var(--olive)!important;color:var(--olive)!important}
  .approve:hover{background:rgba(147,160,106,.12)}
  .reject{border-color:#a86a52!important;color:#e0a58f!important}
  .reject:hover{background:rgba(205,96,70,.12)}
  .del:hover{color:var(--clay);border-color:var(--clay)}
  .empty{color:var(--muted);text-align:center;padding:40px 10px}
  .status{color:var(--muted);font-size:.85rem;margin:10px 0}
  .harmnote{color:#f0a58f;font-size:.78rem;margin-top:10px}
  .event-title{font-family:inherit;font-weight:800;font-size:1.05rem;margin-bottom:4px}
  .event-loc{color:var(--muted);font-size:.85rem;margin-bottom:8px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:5px}
  .field input,.field textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--cream);padding:10px 12px;font-size:.92rem}
  .field textarea{min-height:70px;resize:vertical}
  .field.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .form-card{background:var(--bg-2);border:1px solid var(--amber);border-radius:14px;padding:16px;margin-bottom:16px}
</style>
</head>
<body>
  <h1>Heard.ke admin</h1>
  <p class="sub">Private controls for Heard.ke. Nothing here is public until you say so.</p>

  <div class="gate" id="gate">
    <input type="password" id="key" placeholder="Enter your review key" autocomplete="current-password">
    <button class="btn" onclick="unlock()">Unlock</button>
  </div>

  <div id="panel" style="display:none">
    <div class="section-nav">
      <button class="sectionbtn on" data-sec="wall" onclick="setSection('wall')">Wall review</button>
      <button class="sectionbtn" data-sec="events" onclick="setSection('events')">Meetups</button>
      <button class="sectionbtn" data-sec="guide" onclick="setSection('guide')">Guide</button>
    </div>

    <!-- WALL -->
    <div id="section-wall">
      <div class="tabs">
        <button class="tab on" data-s="pending" onclick="setTab('pending')">Pending</button>
        <button class="tab" data-s="approved" onclick="setTab('approved')">Approved</button>
        <button class="tab" data-s="rejected" onclick="setTab('rejected')">Rejected</button>
      </div>
      <div class="status" id="wallStatus"></div>
      <div id="wallList"></div>
    </div>

    <!-- EVENTS -->
    <div id="section-events" style="display:none">
      <div class="row" style="margin-bottom:16px">
        <button class="btn" onclick="showEventForm()">+ Add a meetup</button>
        <button class="btn ghost" onclick="syncNow()" id="syncBtn">Sync Google Calendar</button>
      </div>
      <div class="status" id="syncStatus"></div>
      <div id="eventForm" style="display:none" class="form-card">
        <div class="field">
          <label>Title</label>
          <input id="ev-title" placeholder="e.g. Saturday morning run">
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="ev-desc" placeholder="What it is, what to expect, who it's for"></textarea>
        </div>
        <div class="field">
          <label>Location</label>
          <input id="ev-loc" placeholder="e.g. Karura Forest, Nairobi">
        </div>
        <div class="field two">
          <div>
            <label>Date</label>
            <input id="ev-date" type="date">
          </div>
          <div>
            <label>Time</label>
            <input id="ev-time" type="time">
          </div>
        </div>
        <div class="row">
          <button class="btn" onclick="saveEvent()" id="ev-save">Add meetup</button>
          <button class="btn ghost" onclick="hideEventForm()">Cancel</button>
        </div>
      </div>
      <div class="status" id="eventsStatus"></div>
      <div id="eventsList"></div>
    </div>

    <!-- GUIDE -->
    <div id="section-guide" style="display:none">
      <div class="tabs">
        <button class="tab on" data-g="advice" onclick="setGuideTab('advice')">Advice</button>
        <button class="tab" data-g="contact" onclick="setGuideTab('contact')">Talk to someone</button>
        <button class="tab" data-g="book" onclick="setGuideTab('book')">Books</button>
        <button class="tab" data-g="music" onclick="setGuideTab('music')">Music</button>
      </div>
      <div class="row" style="margin-bottom:16px">
        <button class="btn" onclick="showGuideForm()">+ Add item</button>
      </div>
      <div id="guideForm" style="display:none" class="form-card">
        <div class="field">
          <label>Title</label>
          <input id="gi-title" placeholder="e.g. Stress creeping up on you?">
        </div>
        <div class="field">
          <label id="gi-body-label">Body</label>
          <textarea id="gi-body" placeholder="..."></textarea>
        </div>
        <div class="field" id="gi-url-field" style="display:none">
          <label>Link URL</label>
          <input id="gi-url" placeholder="https://...">
        </div>
        <div class="row">
          <button class="btn" onclick="saveGuideItem()" id="gi-save">Add item</button>
          <button class="btn ghost" onclick="hideGuideForm()">Cancel</button>
        </div>
      </div>
      <div class="status" id="guideStatus"></div>
      <div id="guideList"></div>
    </div>
  </div>

<script>
const API_BASE=''; // same-origin; Netlify proxies /api/* to the backend (see netlify.toml)
let KEY='', TAB='pending', SECTION='wall', EDITING_EVENT_ID=null, GUIDE_TAB='advice', EDITING_GUIDE_ID=null, GUIDE_ITEMS=[];

function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function timeAgo(ts){const d=(Date.now()-ts)/1000;if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}
function fmtWhen(ts){const d=new Date(ts);return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('en-GB',{hour:'numeric',minute:'2-digit'});}

async function unlock(){
  const k=document.getElementById('key').value.trim();
  if(!k) return;
  KEY=k;
  const result=await loadWall();
  if(result==='ok'){
    localStorage.setItem('heardke_admin_key',k);
    document.getElementById('gate').style.display='none';
    document.getElementById('panel').style.display='block';
  }else if(result==='unauthorized'){
    localStorage.removeItem('heardke_admin_key');
    alert('That key was not accepted.');
  }else{
    alert('Could not reach the server. Check your connection and try again.');
  }
}

function setSection(sec){
  SECTION=sec;
  document.querySelectorAll('.sectionbtn').forEach(b=>b.classList.toggle('on',b.dataset.sec===sec));
  document.getElementById('section-wall').style.display=sec==='wall'?'block':'none';
  document.getElementById('section-events').style.display=sec==='events'?'block':'none';
  document.getElementById('section-guide').style.display=sec==='guide'?'block':'none';
  if(sec==='events') loadEvents();
  if(sec==='guide') loadGuideItems();
}

/* ---------- wall review ---------- */
function setTab(s){
  TAB=s;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.s===s));
  loadWall();
}
async function loadWall(){
  const st=document.getElementById('wallStatus'); st.textContent='Loading…';
  try{
    const res=await fetch(API_BASE+'/api/admin/wall?status='+TAB,{headers:{'x-admin-key':KEY}});
    if(res.status===401){ st.textContent=''; return 'unauthorized'; }
    if(!res.ok) throw new Error('failed');
    const data=await res.json();
    renderWall(data);
    return 'ok';
  }catch(e){
    st.textContent='Could not reach the server. Try again in a moment.';
    return 'error';
  }
}
function renderWall(data){
  const c=data.counts||{};
  document.getElementById('wallStatus').textContent=
    `Pending: ${c.pending||0} · Approved: ${c.approved||0} · Rejected: ${c.rejected||0}`;
  const list=document.getElementById('wallList');
  if(!data.posts.length){ list.innerHTML='<div class="empty">Nothing in "'+TAB+'".</div>'; return; }
  list.innerHTML=data.posts.map(p=>{
    const badges=[];
    if(p.flagged) badges.push('<span class="badge harm">self-harm</span>');
    if(p.reports) badges.push('<span class="badge">'+p.reports+' report'+(p.reports>1?'s':'')+'</span>');
    (p.ai||[]).forEach(cat=>badges.push('<span class="badge ai">'+esc(cat)+'</span>'));
    let actions='';
    if(TAB==='pending') actions='<button class="approve" onclick="actWall('+p.id+',\'approve\')">Approve</button><button class="reject" onclick="actWall('+p.id+',\'reject\')">Reject</button>';
    else if(TAB==='approved') actions='<button class="reject" onclick="actWall('+p.id+',\'reject\')">Take down</button>';
    else actions='<button class="approve" onclick="actWall('+p.id+',\'approve\')">Restore</button>';
    actions+='<button class="del" onclick="actWall('+p.id+',\'delete\')">Delete</button>';
    return '<div class="card'+(p.flagged?' flagged':'')+'">'
      +'<div class="meta"><span>'+timeAgo(p.ts)+'</span>'+badges.join('')+'</div>'
      +'<div class="txt">'+esc(p.text)+'</div>'
      +(p.flagged?'<div class="harmnote">Mentions self-harm — review with care before approving.</div>':'')
      +'<div class="row" style="margin-top:12px">'+actions+'</div>'
      +'</div>';
  }).join('');
}
async function actWall(id,action){
  if(action==='delete' && !confirm('Delete this permanently?')) return;
  try{
    const res=await fetch(API_BASE+'/api/admin/wall/'+id+'/'+action,{method:'POST',headers:{'x-admin-key':KEY}});
    if(!res.ok) throw new Error('failed');
    loadWall();
  }catch(e){ alert('That did not go through. Try again.'); }
}

/* ---------- events ---------- */
function showEventForm(){
  EDITING_EVENT_ID=null;
  document.getElementById('ev-title').value='';
  document.getElementById('ev-desc').value='';
  document.getElementById('ev-loc').value='';
  document.getElementById('ev-date').value='';
  document.getElementById('ev-time').value='';
  document.getElementById('ev-save').textContent='Add meetup';
  document.getElementById('eventForm').style.display='block';
}
function hideEventForm(){
  EDITING_EVENT_ID=null;
  document.getElementById('eventForm').style.display='none';
}
function editEvent(ev){
  EDITING_EVENT_ID=ev.id;
  document.getElementById('ev-title').value=ev.title;
  document.getElementById('ev-desc').value=ev.description;
  document.getElementById('ev-loc').value=ev.location;
  const d=new Date(ev.datetime);
  const pad=n=>String(n).padStart(2,'0');
  document.getElementById('ev-date').value=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  document.getElementById('ev-time').value=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  document.getElementById('ev-save').textContent='Save changes';
  document.getElementById('eventForm').style.display='block';
  document.getElementById('eventForm').scrollIntoView({behavior:'smooth',block:'center'});
}
async function saveEvent(){
  const title=document.getElementById('ev-title').value.trim();
  const description=document.getElementById('ev-desc').value.trim();
  const location=document.getElementById('ev-loc').value.trim();
  const date=document.getElementById('ev-date').value;
  const time=document.getElementById('ev-time').value;
  if(!title||!description||!location||!date||!time){ alert('Fill in every field.'); return; }
  const datetime=new Date(date+'T'+time).getTime();
  if(!Number.isFinite(datetime)){ alert('That date/time is not valid.'); return; }
  const body=JSON.stringify({title,description,location,datetime});
  const url=EDITING_EVENT_ID
    ? API_BASE+'/api/admin/events/'+EDITING_EVENT_ID+'/update'
    : API_BASE+'/api/admin/events';
  try{
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':KEY},body});
    if(!res.ok) throw new Error('failed');
    hideEventForm();
    loadEvents();
  }catch(e){ alert('Could not save that meetup. Try again.'); }
}
async function deleteEvent(id){
  if(!confirm('Delete this meetup? RSVPs for it will be removed too.')) return;
  try{
    const res=await fetch(API_BASE+'/api/admin/events/'+id+'/delete',{method:'POST',headers:{'x-admin-key':KEY}});
    if(!res.ok) throw new Error('failed');
    loadEvents();
  }catch(e){ alert('That did not go through. Try again.'); }
}
async function loadEvents(){
  const st=document.getElementById('eventsStatus'); st.textContent='Loading…';
  try{
    const res=await fetch(API_BASE+'/api/admin/events',{headers:{'x-admin-key':KEY}});
    if(!res.ok) throw new Error('failed');
    const data=await res.json();
    renderSyncStatus(data.sync);
    renderEvents(data.events||[]);
  }catch(e){
    st.textContent='Could not reach the server. Try again in a moment.';
  }
}
function renderSyncStatus(sync){
  const el=document.getElementById('syncStatus');
  const syncBtn=document.getElementById('syncBtn');
  if(!sync||!sync.enabled){
    el.textContent='Google Calendar sync is not set up yet. Ask Claude to add GOOGLE_CALENDAR_ICS_URL on Render.';
    syncBtn.style.display='none';
    return;
  }
  syncBtn.style.display='inline-block';
  if(!sync.lastSyncedAt){ el.textContent='Google Calendar sync enabled — not synced yet.'; return; }
  const when=timeAgo(sync.lastSyncedAt);
  el.textContent=sync.lastSyncOk
    ? `Last synced with Google Calendar ${when}.`
    : `Last sync failed (${when}): ${sync.lastSyncError||'unknown error'}`;
}
async function syncNow(){
  const btn=document.getElementById('syncBtn');
  btn.disabled=true; btn.textContent='Syncing…';
  try{
    const res=await fetch(API_BASE+'/api/admin/events/sync',{method:'POST',headers:{'x-admin-key':KEY}});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'failed');
    await loadEvents();
  }catch(e){
    alert('Sync failed: '+(e.message||'try again in a moment.'));
  }finally{
    btn.disabled=false; btn.textContent='Sync Google Calendar';
  }
}
function renderEvents(events){
  const st=document.getElementById('eventsStatus');
  const now=Date.now();
  const upcoming=events.filter(e=>e.datetime>now).length;
  st.textContent=`${upcoming} upcoming · ${events.length} total`;
  const list=document.getElementById('eventsList');
  if(!events.length){ list.innerHTML='<div class="empty">No meetups yet. Add one above.</div>'; return; }
  list.innerHTML=events.map(ev=>{
    const isPast=ev.datetime<=now;
    const editDeleteButtons=ev.synced
      ? ''
      : '<button class="approve" onclick=\'editEvent('+JSON.stringify(ev).replace(/'/g,"&#39;")+')\'>Edit</button>'
        +'<button class="del" onclick="deleteEvent('+ev.id+')">Delete</button>';
    return '<div class="card'+(isPast?' past':'')+'">'
      +'<div class="meta"><span class="badge">'+fmtWhen(ev.datetime)+'</span>'+(isPast?'<span class="badge">past</span>':'')+(ev.synced?'<span class="badge synced">Google Calendar</span>':'')+'<span>'+ev.rsvp_count+' going</span></div>'
      +'<div class="event-title">'+esc(ev.title)+'</div>'
      +'<div class="event-loc">'+esc(ev.location)+'</div>'
      +'<div class="txt">'+esc(ev.description)+'</div>'
      +(ev.synced?'<div class="synced-note">Managed in Google Calendar — edit or delete it there, changes sync in automatically.</div>':'')
      +'<div class="row" style="margin-top:10px">'
        +editDeleteButtons
        +(ev.rsvp_count>0?'<button class="reject" onclick="toggleAttendees('+ev.id+')" id="attBtn-'+ev.id+'">View attendees ('+ev.rsvp_count+')</button>':'')
      +'</div>'
      +'<div id="attendees-'+ev.id+'" style="display:none;margin-top:12px"></div>'
      +'</div>';
  }).join('');
}
async function toggleAttendees(id){
  const box=document.getElementById('attendees-'+id);
  if(box.style.display==='block'){ box.style.display='none'; return; }
  box.style.display='block';
  box.innerHTML='<div class="status">Loading…</div>';
  try{
    const res=await fetch(API_BASE+'/api/admin/events/'+id+'/rsvps',{headers:{'x-admin-key':KEY}});
    if(!res.ok) throw new Error('failed');
    const data=await res.json();
    if(!data.rsvps.length){ box.innerHTML='<div class="status">No one yet.</div>'; return; }
    box.innerHTML=data.rsvps.map(r=>
      '<div style="border-top:1px solid var(--line);padding:8px 0;font-size:.88rem">'
      +'<a href="tel:'+esc(r.phone)+'" style="color:var(--olive)">'+esc(r.phone)+'</a>'
      +(r.email?' · <a href="mailto:'+esc(r.email)+'" style="color:var(--olive)">'+esc(r.email)+'</a>':'')
      +' <span style="color:var(--muted)">· '+timeAgo(r.ts)+'</span>'
      +'</div>'
    ).join('');
  }catch(e){
    box.innerHTML='<div class="status">Could not load attendees. Try again.</div>';
  }
}

/* ---------- guide ---------- */
const GUIDE_LABELS={advice:'Body',contact:'Description (emails and phone numbers auto-link)',book:'Author',music:'Description'};
function setGuideTab(g){
  GUIDE_TAB=g;
  document.querySelectorAll('[data-g]').forEach(t=>t.classList.toggle('on',t.dataset.g===g));
  hideGuideForm();
  renderGuideList();
}
function showGuideForm(){
  EDITING_GUIDE_ID=null;
  document.getElementById('gi-title').value='';
  document.getElementById('gi-body').value='';
  document.getElementById('gi-url').value='';
  document.getElementById('gi-body-label').textContent=GUIDE_LABELS[GUIDE_TAB];
  document.getElementById('gi-url-field').style.display=GUIDE_TAB==='music'?'block':'none';
  document.getElementById('gi-save').textContent='Add item';
  document.getElementById('guideForm').style.display='block';
}
function hideGuideForm(){
  EDITING_GUIDE_ID=null;
  document.getElementById('guideForm').style.display='none';
}
function editGuideItem(item){
  EDITING_GUIDE_ID=item.id;
  document.getElementById('gi-title').value=item.title;
  document.getElementById('gi-body').value=item.body;
  document.getElementById('gi-url').value=item.url||'';
  document.getElementById('gi-body-label').textContent=GUIDE_LABELS[item.section];
  document.getElementById('gi-url-field').style.display=item.section==='music'?'block':'none';
  document.getElementById('gi-save').textContent='Save changes';
  document.getElementById('guideForm').style.display='block';
  document.getElementById('guideForm').scrollIntoView({behavior:'smooth',block:'center'});
}
async function saveGuideItem(){
  const title=document.getElementById('gi-title').value.trim();
  const body=document.getElementById('gi-body').value.trim();
  const url=document.getElementById('gi-url').value.trim();
  if(!title||!body){ alert('Fill in the title and body.'); return; }
  if(GUIDE_TAB==='music' && url && !/^https?:\/\//i.test(url)){ alert('The link must start with http:// or https://'); return; }
  const payload={section:GUIDE_TAB, title, body, url: url||null};
  const endpoint=EDITING_GUIDE_ID?API_BASE+'/api/admin/guide/'+EDITING_GUIDE_ID+'/update':API_BASE+'/api/admin/guide';
  try{
    const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':KEY},body:JSON.stringify(payload)});
    const data=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error||'failed');
    hideGuideForm();
    loadGuideItems();
  }catch(e){ alert('Could not save that item: '+(e.message||'try again.')); }
}
async function deleteGuideItem(id){
  if(!confirm('Delete this item?')) return;
  try{
    const res=await fetch(API_BASE+'/api/admin/guide/'+id+'/delete',{method:'POST',headers:{'x-admin-key':KEY}});
    if(!res.ok) throw new Error('failed');
    loadGuideItems();
  }catch(e){ alert('That did not go through. Try again.'); }
}
async function moveGuideItem(id,direction){
  try{
    const res=await fetch(API_BASE+'/api/admin/guide/'+id+'/move',{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':KEY},body:JSON.stringify({direction})});
    if(!res.ok) throw new Error('failed');
    loadGuideItems();
  }catch(e){ alert('That did not go through. Try again.'); }
}
async function loadGuideItems(){
  const st=document.getElementById('guideStatus'); st.textContent='Loading…';
  try{
    const res=await fetch(API_BASE+'/api/admin/guide',{headers:{'x-admin-key':KEY}});
    if(!res.ok) throw new Error('failed');
    const data=await res.json();
    GUIDE_ITEMS=data.items||[];
    st.textContent='';
    renderGuideList();
  }catch(e){
    st.textContent='Could not reach the server. Try again in a moment.';
  }
}
function renderGuideList(){
  const list=document.getElementById('guideList');
  const items=GUIDE_ITEMS.filter(i=>i.section===GUIDE_TAB).sort((a,b)=>a.position-b.position);
  if(!items.length){ list.innerHTML='<div class="empty">Nothing here yet. Add one above.</div>'; return; }
  list.innerHTML=items.map((item,idx)=>{
    const urlLine=item.url?'<div class="event-loc">'+esc(item.url)+'</div>':'';
    return '<div class="card">'
      +'<div class="txt" style="margin-bottom:6px"><strong>'+esc(item.title)+'</strong></div>'
      +urlLine
      +'<div class="txt">'+esc(item.body)+'</div>'
      +'<div class="row">'
        +'<button class="approve" onclick=\'editGuideItem('+JSON.stringify(item).replace(/'/g,"&#39;")+')\'>Edit</button>'
        +'<button class="del" onclick="deleteGuideItem('+item.id+')">Delete</button>'
        +(idx>0?'<button onclick="moveGuideItem('+item.id+',\'up\')">↑ Move up</button>':'')
        +(idx<items.length-1?'<button onclick="moveGuideItem('+item.id+',\'down\')">↓ Move down</button>':'')
      +'</div>'
      +'</div>';
  }).join('');
}

// auto-unlock if key already saved
(function(){
  const saved=localStorage.getItem('heardke_admin_key');
  if(saved){ document.getElementById('key').value=saved; unlock(); }
})();
</script>
